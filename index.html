  body {

 header {
  background-color: #ffd6ba;
  padding: 15px 20px;
  font-weight: bold;
  color: #7a4e3e;
  display: flex;
  flex-wrap: wrap;       
  align-items: center;
  justify-content: space-between;  /* Left luôn bên trái, center căn giữa */
  gap: 15px;
}

/* Left: icon + home text */
.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 0 0 auto;          /* không bị co lại */
}

.header-left a {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 24px;
  color: #7a4e3e;
  text-decoration: none;
}

.header-left a i {
  font-size: 28px;
}

/* Center title */
header {
  position: relative;
}

.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  font-size: 32px;
  margin: 0;
  white-space: nowrap;
}
/* ===== TOP SELECT ===== */
.top-bar{
  width:85%;
  margin:20px auto;
  display:flex;
  align-items:center;
  gap:20px;
}

.top-bar select{
  min-width:240px;
  flex-shrink:0;
}

.top-bar audio{
  flex:1;
  height:42px;
}

select {
  padding: 8px 14px;
  font-size: 18px;
  border-radius: 8px;
  border: 2px solid #a0e7e5;
  background-color: #e3fdfd;
}



/* MEDIA QUERY cho điện thoại */
@media (max-width: 480px) {

  .header-center {
    flex-basis: 100%;
    order: 2;
    text-align: center;
    position: static;
    transform: none;
    margin-top: 8px;
  }

  .header-left {
    order: 1;

  /* Lesson + Audio xuống hàng trên điện thoại */
  .top-bar{
    flex-direction: column;
    align-items: stretch;
    width: 90%;
  }

  .top-bar select{
    width: 100%;
  }

  .top-bar audio{
    width: 100%;
  }
}

  header {

  .top-select {

.word-row {

.word-row:last-child { border-bottom: none; }

<script>
// Bắt sự kiện Enter cho tất cả các ô input trong bài tập
document.addEventListener("DOMContentLoaded", function() {
  const exerciseInputs = document.querySelectorAll(".exercise input");

  exerciseInputs.forEach(input => {
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {      // Kiểm tra nếu nhấn Enter
        e.preventDefault();          // Ngăn việc xuống dòng mặc định
        const checkBtn = this.nextElementSibling; // giả định nút Check ngay sau input
        if (checkBtn && checkBtn.tagName === "BUTTON") {
          checkBtn.click();         // kích hoạt nút Check
        }
      }
    });
  });
});
</script>

<script>
const selectEl = document.getElementById("wordList");

function sortOptionsByNumber() {
  const opts = Array.from(selectEl.options);

  opts.sort((a, b) => {
    return Number(a.value) - Number(b.value);
  });

  selectEl.innerHTML = "";
  opts.forEach(o => selectEl.appendChild(o));
}

// sort ngay khi load
sortOptionsByNumber();

// sort lại khi mở dropdown
selectEl.addEventListener("mousedown", sortOptionsByNumber);
selectEl.addEventListener("touchstart", sortOptionsByNumber);
</script>

  1: "audio/Lesson 1 Vocab.wav",
  2: "audio/Lesson 2 Vocab.wav",


};

let currList = 1,
    listCopy = [],
    index = 0;

let totalWords = 0;
let knownCount = 0;

let reviewMode = "vn-en";
/********** LOAD LIST **********/
function loadList(){

  currList = document.getElementById("wordList").value;

  listCopy = [...data[currList]];

  totalWords = listCopy.length;

  knownCount = 0;

  updateCounter();

  renderWords();

  loadExercises();

  setMode(reviewMode);

}

function updateCounter(){
  document.getElementById("progressCounter").innerText =
    `Đã biết ${knownCount} / ${totalWords}`;
}
function setMode(mode){

   reviewMode = mode;

   document.getElementById("btnVNEN")
      .style.background =
      mode==="vn-en"
      ? "#ffb3ba"
      : "#a0e7e5";

   document.getElementById("btnENVN")
      .style.background =
      mode==="en-vn"
      ? "#ffb3ba"
      : "#a0e7e5";

   nextWord();

}

document.getElementById("wordList").onchange = loadList;
loadList();


function speakWord(text){

  speechSynthesis.cancel();

  let cleanText = text;

  // bỏ phiên âm /.../
  cleanText = cleanText.split("/")[0];

  // bỏ loại từ (n), (v), (adj), (phr v)...
  cleanText = cleanText.replace(/\(.*?\)/g,"").trim();

  const utter = new SpeechSynthesisUtterance(cleanText);

  utter.lang = "en-US";
  utter.rate = 0.85;
  utter.pitch = 1;
  utter.volume = 1;

  speechSynthesis.speak(utter);
}

/********** RENDER & SORT **********/
function renderWords(){

  const box = document.getElementById("wordContainer");
  box.innerHTML = "";

  let sorted = [...data[currList]].sort((a,b)=>b.tick - a.tick);

  sorted.forEach(item=>{

    let realIndex = data[currList].indexOf(item);

    box.innerHTML += `
      <div class="word-row">

<span class="word-text">

  <span class="en-word">
    ${item.en}:
  </span>

  <span class="vn-word">
    ${item.vn}
  </span>

  <i class="fa-solid fa-volume-high speaker-icon"
     onclick="event.stopPropagation();speakWord(\`${item.en}\`)">
  </i>

</span>

        <input
          type="checkbox"
          ${item.tick ? "checked" : ""}
          onclick="toggleTick(${realIndex})">

      </div>
    `;
  });

}
/********** TICK UPDATE **********/
function toggleTick(realIndex){
  data[currList][realIndex].tick = !data[currList][realIndex].tick;
  renderWords();
}

/********** REVIEW **********/
function nextWord(){
  document.getElementById("answer").innerHTML="";
  if(listCopy.length===0){
    document.getElementById("vietWord").innerHTML="🎉 Bạn đã học xong hết!";
    return;
  }
  index=Math.floor(Math.random()*listCopy.length);
if(reviewMode==="vn-en"){

document.getElementById("vietWord").innerHTML =
listCopy[index].vn;

}
else{

document.getElementById("vietWord").innerHTML =
listCopy[index].en;

}
}

function know(){
  firework();
  knownCount++;
  listCopy.splice(index,1);
  updateCounter();
  nextWord();
}

function dontKnow(){

if(reviewMode==="vn-en"){

document.getElementById("answer").innerHTML =
listCopy[index].en;

}
else{

document.getElementById("answer").innerHTML =
listCopy[index].vn;

}

}

/********** EXERCISES **********/
function loadExercises(){
  const box=document.getElementById("exercise");
  box.innerHTML="";
  exercises[currList].forEach((item,i)=>{
    box.innerHTML+=`
    <div style="margin:10px 0;">
      ${i+1}. ${item.q}
      <input id="ex${i}">
      <button onclick="checkEx(${i})">Check</button>
      <span id="res${i}" class="result"></span>
    </div>`;
  });
}

function checkEx(i){
  const user = document.getElementById("ex"+i).value.trim().toLowerCase();
  const ans = exercises[currList][i].a.toLowerCase();
  const box = document.getElementById("res"+i);

  if(user === ans) {
    box.innerHTML = "✔ Correct";
    box.style.color = "#28a745"; // chữ Correct màu xanh lá
    firework(); // gọi pháo hoa
  } else {
    box.innerHTML = "✘ " + exercises[currList][i].a;
    box.style.color = "#D02752"; // chữ sai màu đỏ
  }
}

/********** FIREWORK **********/
function firework(){
  for(let i=0;i<25;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.setProperty("--x",(Math.random()-.5)*600+"px");
    c.style.setProperty("--y",(Math.random()-.5)*600+"px");
    c.style.backgroundColor=`hsl(${Math.random()*360},90%,60%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),900);
  }
}
</script>
